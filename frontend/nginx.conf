# Maps the Upgrade header so the /api/ proxy can carry WebSocket upgrades.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + health are proxied to the backend service, so the browser talks to a
    # single origin (no CORS) — the production analogue of the Vite dev proxy.
    # proxy_http_version 1.1 + Upgrade/Connection carry the chat WebSocket.
    location /api/ {
        proxy_pass http://backend:8200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass http://backend:8200/health;
    }

    # SPA fallback — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
